name: Daily Scraping

on:
  schedule:
    # Exécution tous les jours à 22h UTC (23h GMT+1)
    - cron: '0 22 * * *'
  workflow_dispatch: # Permet de déclencher manuellement le workflow

# Le push vers `main` et le sous-module `scraped` se fait via `secrets.PAT_TOKEN`
# (voir l'étape "Checkout"), pas via le GITHUB_TOKEN par défaut. Celui-ci n'a donc
# besoin que d'un accès en lecture.
permissions:
  contents: read

# Partage le même groupe que le workflow bimensuel du dimanche : les deux workflows
# écrivent dans le même sous-module et poussent sur `main`. Ce workflow déclenche lui-même
# Biweekly Sunday Scripts en fin de run (voir job `trigger-biweekly-gaps`), ce qui les
# sérialise déjà ; ce verrou reste en défense en profondeur si Biweekly est aussi
# lancé manuellement (workflow_dispatch) pendant un run de Daily Scraping.
concurrency:
  group: mtg-scraper-pipeline
  cancel-in-progress: false

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    outputs:
      is_sunday: ${{ steps.day.outputs.is_sunday }}

    steps:
      - name: Determine day of week
        id: day
        run: |
          if [ "$(date -u +%u)" = "7" ]; then
            echo "is_sunday=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_sunday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Sync submodule to latest remote
        run: |
          SUBMODULE_PATH=$(git config --file .gitmodules --get-regexp path | awk '{print $2}')
          cd "$SUBMODULE_PATH"
          BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
          git checkout "$BRANCH"
          git pull origin "$BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install project
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit

      - name: Run scraping - MTGO
        run: scrape --source mtgo

      - name: Run scraping - MTGTop8
        run: scrape --source mtgtop8 --span 300

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Commit and push scraped data
        run: |
          DATE=$(date -u +"%Y-%m-%d")

          SUBMODULE_PATH=$(git config --file .gitmodules --get-regexp path | awk '{print $2}')
          cd "$SUBMODULE_PATH"

          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "$DATE Daily Scraping"
            git pull --rebase
            git push origin HEAD
          fi

          cd ..
          if [[ -n $(git status --porcelain "$SUBMODULE_PATH") ]]; then
            git add "$SUBMODULE_PATH"
            git commit -m "$DATE Update scraping data submodule"
            git pull --rebase origin main
            git push

            echo "✅ Scraping completed and pushed successfully"

            # Déclencher le workflow d'import dans l'autre repo
            curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ secrets.IMPORT_REPO }}/dispatches \
              -d '{"event_type":"scraping_completed"}'
          else
            echo "ℹ️ No changes detected in scraped data"
          fi

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ Daily Scraping Success - ${{ github.run_id }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Le scraping quotidien s'est terminé avec succès.

            Date: ${{ github.event.repository.updated_at }}
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Consultez les détails: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ Daily Scraping Failed - ${{ github.run_id }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            ⚠️ Le scraping quotidien a échoué.

            Date: ${{ github.event.repository.updated_at }}
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Consultez les logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  trigger-biweekly-gaps:
    name: Trigger Biweekly Sunday Scripts
    needs: scrape-and-commit
    if: needs.scrape-and-commit.outputs.is_sunday == 'true'
    uses: ./.github/workflows/biweekly_check_gaps.yml
    secrets: inherit
